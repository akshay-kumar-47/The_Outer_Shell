services:
  # PostgreSQL Database
  - type: database
    name: clothing-store-db
    plan: free

  # Backend Express API
  - type: web
    name: clothing-store-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clothing-store-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true

  # Frontend Vite React App
  - type: web
    name: clothing-store-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: clothing-store-backend
          envVarKey: RENDER_EXTERNAL_URL
